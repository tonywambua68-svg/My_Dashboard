<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
        <script src="https://js-de.sentry-cdn.com/c3ba9baacc484a83bdea5be70dd9c7ad.min.js" crossorigin="anonymous"></script>
        <title>Personal Tracker</title>
    </head>
    <body class="app-background">
        <header>
        <h1>Personal Tracker</h1>
        <p class="track">track your daily habits and goals</p>
    </header>
        <div>
            <div class="container">
                <button class="habits" id="command">
                    <p class="stat-lebal">Habits Today</p>
                    <p class="stat-num" id="habitCount">0/0</p>
                </button>
                <button class="tasks" id="command">
                    <P class="stat-lebal">Tasks Done</P>
                    <p class="stat-num" id="taskCount">0/0</p>
                </button>
                <button class="streak" id="command">
                    <p class="stat-lebal" >Total Streak</p>
                    <p class="stat-num" id="streakCount">0</p>
                </button>
                <button class="week" id="command">
                    <p class="stat-lebal">This Week</p>
                    <p class="stat-num" id="weekCount">0</p>
                </button>
            </div>
    <div class="main-sections">
      <div class="daily-habits">
        <h2>Daily Habits</h2>
        <div class="add-habit">
          <input type="text" id="habitInput" placeholder="Add new habit..." autocomplete="off" />
          <button class="modern-button" onclick="addHabit()">Add Habit</button>
        </div>
        <div id="habitList"></div>
      </div>
      <div class="today-task">
        <h3>Today's Tasks</h3>
        <div class="add-task">
          <input type="text" id="taskInput" placeholder="Add new task..." autocomplete="off" />
          <button class="modern-button" onclick="addTask()">Add Task</button>
        </div>
        <div id="taskList"></div>
      </div>
    </div>
        </div>
        <div class="chart-container">
            <h4>Weekly Progress</h4>
            <canvas id="weeklyChart"></canvas>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
 <script src="js/script.js"></script>
 
     
    </body>


</html>
